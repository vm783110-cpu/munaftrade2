<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial;
background:#0b0f19;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* MAIN CARD */

.container{
width:380px;
background:#111827;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#6a5cff,#ff3cac);
padding:30px;
text-align:center;
}

.profile{
width:110px;
height:110px;
border-radius:20px;
object-fit:cover;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

.name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

/* BADGES */

.badges{
margin-top:12px;
}

.badge{
display:inline-block;
padding:6px 14px;
border-radius:20px;
font-size:13px;
margin:5px;
}

.premium{
background:#8b5cf6;
}

.live{
background:#22c55e;
}

/* MEMBERS */

.members{
margin-top:10px;
font-size:15px;
}

/* STATS */

.stats{
display:flex;
gap:12px;
padding:20px;
}

.card{
flex:1;
padding:20px;
border-radius:15px;
text-align:center;
font-weight:bold;
}

.win{
background:linear-gradient(45deg,#22c55e,#16a34a);
}

.rating{
background:linear-gradient(45deg,#f97316,#fb923c);
}

/* TELEGRAM BUTTON */

.telegram{
margin:0 20px 20px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:16px;
border-radius:15px;
background:linear-gradient(90deg,#6366f1,#a855f7);
color:white;
font-weight:bold;
text-decoration:none;
font-size:16px;
}

.telegram img{
width:20px;
}

/* FEATURES */

.features{
display:flex;
justify-content:space-around;
padding:20px;
text-align:center;
}

.feature{
font-size:13px;
}

.icon{
width:45px;
height:45px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:6px;
font-size:20px;
}

.v{background:#22c55e;}
.s{background:#3b82f6;}
.p{background:#ec4899;}
.t{background:#f59e0b;}

/* FOOTER */

.footer{
text-align:center;
padding:15px;
font-size:13px;
color:#9ca3af;
}
